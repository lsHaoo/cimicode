<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO回调处理</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f7f7;
    }
    .message {
      text-align: center;
      color: #666;
    }
    .success {
      color: #52c41a;
      font-size: 18px;
      font-weight: 500;
    }
    .error {
      color: #e74c3c;
      font-size: 18px;
      font-weight: 500;
    }
    .warning {
      color: #faad14;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="message">
    <div id="content">处理登录中...</div>
    <div id="error-detail" class="warning" style="display: none; margin-top: 10px;"></div>
  </div>

  <script>
    (function() {
      'use strict';

      console.log("SSO callback page loaded");

      const params = new URLSearchParams(window.location.search);
      const contentEl = document.getElementById('content');
      const errorDetailEl = document.getElementById('error-detail');

      if (params.has('error')) {
        const error = params.get('error');
        const errorDescription = params.get('error_description') || error;

        contentEl.className = 'error';
        contentEl.textContent = '登录失败';
        errorDetailEl.style.display = 'block';
        errorDetailEl.textContent = '错误: ' + errorDescription;

        const notifyError = () => {
          try {
            if (window.parent !== window) {
              window.parent.postMessage({
                type: 'sso-callback',
                url: window.location.href,
                error: true,
                errorMessage: errorDescription
              }, '*');
            }
          } catch (e) {
            console.error("Failed to notify parent:", e);
          }
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', notifyError);
        } else {
          notifyError();
        }
        return;
      }

      if (params.has('code')) {
        contentEl.textContent = '登录成功，正在进入应用...';
        contentEl.className = 'success';

        const notifyParent = () => {
          try {
            if (window.parent !== window) {
              window.parent.postMessage({
                type: 'sso-callback',
                url: window.location.href,
                success: true
              }, '*');

              setTimeout(() => {
                errorDetailEl.style.display = 'block';
                errorDetailEl.textContent = '如果页面没有自动关闭，请手动关闭此窗口';
              }, 2000);
            } else {
              contentEl.className = 'error';
              contentEl.textContent = '页面加载错误';
              errorDetailEl.style.display = 'block';
              errorDetailEl.textContent = '未找到父窗口，请刷新应用重试';
            }
          } catch (error) {
            contentEl.className = 'error';
            contentEl.textContent = '通知失败';
            errorDetailEl.style.display = 'block';
            errorDetailEl.textContent = '无法通知主窗口，请刷新应用重试';
          }
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', notifyParent);
        } else {
          notifyParent();
        }
      } else {
        contentEl.textContent = 'SSO回调页面';
        errorDetailEl.style.display = 'block';
        errorDetailEl.textContent = '请通过SSO登录流程访问此页面';
      }
    })();
  </script>
</body>
</html>
